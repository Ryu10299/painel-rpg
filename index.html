<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Painel Investigativo RPG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h2>Nome do Investigador</h2>

<input id="nameInput" placeholder="Digite seu nome">

<br><br>

<button id="enterBtn">Entrar</button>

</div>


<!-- BARRA SUPERIOR -->

<div id="topbar">

<button id="createRoom">Criar Sala</button>

<input id="roomCode" placeholder="Código da sala">

<button id="joinRoom">Entrar</button>

<button id="recentBtn">Recentes</button>

<button id="addEvidence">Evidência</button>

<button id="addSuspect">Suspeito</button>

<button id="drawBtn">Desenhar</button>

<button id="playersBtn">Lista</button>

<button id="chatBtn">Chat</button>

</div>


<!-- QUADRO INVESTIGATIVO -->

<div id="board"></div>


<!-- CANVAS DESENHO -->

<canvas id="drawCanvas"></canvas>


<!-- LISTA DE JOGADORES -->

<div id="playersPanel" class="panel">

<h3>Investigadores</h3>

<div id="playerList"></div>

</div>


<!-- CHAT -->

<div id="chatPanel" class="panel">

<div id="messages"></div>

<input id="chatInput" placeholder="Mensagem">

<button id="sendChat">Enviar</button>

</div>


<!-- SALAS RECENTES -->

<div id="recentPanel"></div>


<!-- SCRIPTS DO SISTEMA -->

<script type="module" src="firebase.js"></script>

<script type="module" src="app.js"></script>

<script type="module" src="rooms.js"></script>

<script type="module" src="board.js"></script>

<script type="module" src="suspects.js"></script>

<script type="module" src="draw.js"></script>

<script type="module" src="chat.js"></script>

<script type="module" src="players.js"></script>

<script type="module" src="ui.js"></script>


</body>

</html>

<div class="board-controls">
    <input type="file" id="upload-evidence">
    <button id="add-note">Adicionar Nota</button>
</div>

<div id="investigation-board"></div>

<script src="board.js"></script>

<div class="suspect-system">

<h2>Suspeitos</h2>

<input type="text" id="suspect-name" placeholder="Nome do suspeito">

<textarea id="suspect-desc" placeholder="Descrição"></textarea>

<input type="file" id="suspect-photo">

<button id="add-suspect">Adicionar Suspeito</button>

<div id="suspect-list"></div>

</div>

<script src="suspects.js"></script>

<div id="investigation-board">

<canvas id="draw-layer"></canvas>

</div>

<script src="draw.js"></script>

<div class="chat-system">

<h3>Chat da Investigação</h3>

<div id="chat-box"></div>

<div class="chat-input-area">
<input id="chat-input" placeholder="Mensagem">
<button id="send-msg">Enviar</button>
</div>

</div>

<script type="module" src="chat.js"></script>

<div class="players-system">

<h3>Investigadores Online</h3>

<div id="players-list"></div>

</div>

<script type="module" src="players.js"></script>
